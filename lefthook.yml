# Mirrors the CI pipeline — .github/workflows/ci.yml
# E2E tests are excluded (require browser install; run via: bunx playwright test)
# Skip all hooks: git commit --no-verify
# Run all checks manually: bun run ci:check

pre-commit:
  piped: true
  commands:
    lint:
      run: npm run lint
    check:
      run: npm run check
    test:
      run: npm run test:unit:ci
    build:
      run: npm run build
