# Authentik blueprint — veent-crm OAuth2/OIDC provider + application
#
# APPLIED to the live Authentik (auth.veent.io, goauthentik 2026.2.1) on 2026-07-13
# via: docker cp -> /blueprints/, then `ak apply_blueprint veent-crm-blueprint.yaml`.
# Verified created; existing apps (veent-sched, nextcloud) left untouched.
#
# NOTES for the later CRM-code EXECUTE step:
#   - discoveryUrl : https://auth.veent.io/application/o/veent-crm/.well-known/openid-configuration
#   - issuer       : https://auth.veent.io/application/o/veent-crm/
#   - client_id + client_secret are AUTO-GENERATED by Authentik on apply (NOT stored here).
#     Retrieve them from the Authentik admin UI (Applications -> veent-crm -> Provider)
#     or the session report. The client_secret is a credential — never commit it.
#   - Redirect URI registered: http://localhost:5173/api/auth/oauth2/callback/authentik  (DEV ONLY)
#     Add the production origin (Vercel domain or crm.veent.io) when the deploy target is settled.
#
# To re-apply idempotently (upserts by identifiers name=veent-crm / slug=veent-crm):
#   docker cp veent-crm-authentik-blueprint.yaml authentik-server-1:/blueprints/veent-crm-blueprint.yaml
#   docker exec authentik-server-1 ak apply_blueprint veent-crm-blueprint.yaml
version: 1
metadata:
  name: veent-crm OAuth2 provider + application
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: veent-crm-provider
    identifiers:
      name: veent-crm
    attrs:
      client_type: confidential
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      property_mappings:
        - !Find [authentik_core.propertymapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
        - !Find [authentik_core.propertymapping, [managed, "goauthentik.io/providers/oauth2/scope-email"]]
        - !Find [authentik_core.propertymapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
      redirect_uris:
        - matching_mode: strict
          url: "http://localhost:5173/api/auth/oauth2/callback/authentik"
  - model: authentik_core.application
    id: veent-crm-app
    identifiers:
      slug: veent-crm
    attrs:
      name: veent-crm
      provider: !KeyOf veent-crm-provider
